              name: cheminAccesEndommage
              label:
                fr: "Est-ce que le chemin d'accès qui mène à votre résidence a été endommagé?"
              options: yesno
            - type: radio
              name: seulCheminAcces
              label:
                fr: "Est-ce le seul chemin d'accès qui mène à votre résidence?"
              v-if: "this.val('cheminAccesEndommage') === 'true'"
              options: yesno
            - type: radio
              name: accesMinimaSecuritaire
              label:
                fr: "Un accès minimal et sécuritaire à votre résidence est-il encore possible?"
              v-if: "this.val('cheminAccesEndommage') === 'true'"
              options: yesno
            - type: montant
              name: coutCheminAcces
              label:
                fr: "Coût (vous devrez fournir les factures d'entrepreneurs)"
              v-if: "this.val('cheminAccesEndommage') === 'true'"
              validations:
                optional:
            - type: textarea
              name: descriptionDommagesCheminAcces
              label:
                fr: "Décrivez brièvement les dommages constatés (ex. : pont ou ponceau endommagé ainsi que sa taille avant le sinistre)"
              v-if: "this.val('cheminAccesEndommage') === 'true'"
              validations:
                optional:

        # Documents à joindre
        - section:
            fr: "H – Documents à joindre"
          id: sectionDocuments
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: avis
              classes: information
              text:
                fr: |
                  <p>Les documents suivants sont nécessaires au traitement de la demande. Vous pouvez les joindre maintenant ou les transmettre ultérieurement à la personne responsable de votre dossier.</p>
            - type: customfile
