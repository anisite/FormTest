              v-if: "this.val('evacuationResidence') === 'true'"
              validations:
                optional:
            - type: adresse
              name: adresseHebergement
              label:
                fr: Adresse du lieu d'hébergement
              v-if: "this.val('evacuationResidence') === 'true'"
              validations:
                optional:
            - type: repeatableGroup
              name: personnesHebergees
              label:
