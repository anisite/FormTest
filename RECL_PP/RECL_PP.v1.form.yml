                fr: "Avez-vous eu ou aurez-vous à déménager ou à faire entreposer vos biens meubles?"
              options: yesno
            - type: montant
              name: coutDemenagement
              label:
                fr: "Coût (vous devez fournir les factures)"
              v-if: "this.val('demenagementEntreposage') === 'true'"

        # 8F – Travaux d'urgence et travaux temporaires
        - section:
            fr: "F – Travaux d'urgence et travaux temporaires"
          id: sectionTravauxUrgence
          components:
            - type: radio
              name: travauxEntrepreneur
              label:
                fr: "Est-ce que des travaux (démolition, nettoyage, élimination des débris, décontamination ou déshumidification) ont été ou seront réalisés par un entrepreneur ou une entreprise de nettoyage après sinistre?"
              options:
                OuiPartie:
                  fr: Oui, en partie
                OuiTotalite:
                  fr: Oui, en totalité
                Non:
                  fr: Non
            - type: montant
              name: coutTravauxEntrepreneur
              label:
                fr: "Coût des travaux faits par un entrepreneur (vous devrez fournir les factures)"
              v-if: "this.val('travauxEntrepreneur') === 'OuiPartie' || this.val('travauxEntrepreneur') === 'OuiTotalite'"
            - type: radio
              name: travauxTemporaires
              label:
                fr: "Avant la réalisation des travaux permanents, est-ce que des travaux comme le rétablissement temporaire de l'électricité ou le placardage d'ouvertures endommagées ont été ou seront réalisés afin de rendre votre résidence habitable?"
              options: yesno
            - type: montant
              name: coutTravauxTemporaires
              label:
                fr: "Coût des travaux temporaires (vous devrez fournir les factures)"
              v-if: "this.val('travauxTemporaires') === 'true'"

        # 8G – Dommages au chemin d'accès
