# yaml-language-server: $schema=https://formulaires.it.mtess.gouv.qc.ca/api/v1/SIS/ObtenirSchema/form
# debug: langue=auto, showAll=true

config:
  securite:
    accesAnonyme: true
  formulaireUnilingue: true  
  confirmationTransmission: 
    texteSupplementaire:
      fr: |
        <p>Votre demande de réclamation a été transmise avec succès. Conservez votre numéro de confirmation.</p>
        <p>Veuillez faire parvenir les documents requis à :</p>
        <ul>
          <li><strong>Par courriel :</strong> aide.financiere@msp.gouv.qc.ca</li>
          <li><strong>Par courrier :</strong> Direction générale du rétablissement, Ministère de la Sécurité publique, Tour du Saint-Laurent, 6e étage, 2525, boulevard Laurier, Québec (Québec) G1V 2L2</li>
        </ul>
  aiguillage:
    choix:
      - mode: confirmation
  domaines:
    typesPieces:
      Salon:
        label:
          fr: Salon
      SalleFamiliale:
        label:
          fr: Salle familiale
      Cuisine:
        label:
          fr: Cuisine
      SalleAManger:
        label:
          fr: Salle à manger
      SalleDeBain:
        label:
          fr: Salle de bain
      SalleDeau:
        label:
          fr: "Salle d'eau"
      SalleDeLavage:
        label:
          fr: Salle de lavage
      Chambre1:
        label:
          fr: Chambre 1
      Chambre2:
        label:
          fr: Chambre 2
      Chambre3:
        label:
          fr: Chambre 3
      Chambre4:
        label:
          fr: Chambre 4
      Bureau:
        label:
          fr: Bureau
      Autre:
        label:
          fr: Autre

form:
  title:
    fr: "Formulaire de réclamation – Particulier – Propriétaire"

  sectionsGroup:

    # ─── Informations sur le sinistre ────────────────────────────────────────
    - sectionGroup:
        fr: Informations sur le sinistre
      classes: icone register
      sections:
        - section:
            fr: Sinistre
          id: sectionSinistre
          components:
            - type: date
              name: dateSinistre
              label:
                fr: Date du sinistre
              max: "{{today}}"
            - type: checkbox
              name: typeSinistre
              label:
                fr: Type de sinistre
              options:
                Inondation:
                  fr: Inondation
                MouvementSol:
                  fr: "Mouvement de sol, érosion ou submersion"
                TrembTerre:
                  fr: Tremblement de terre
                Verglas:
                  fr: Verglas
                Autre:
                  fr: Autre
            - type: text
              name: typeSinistreAutre
              label:
                fr: "Précisez le type de sinistre"
              v-if: "this.val('typeSinistre') && this.val('typeSinistre').includes('Autre')"
            - type: radio
              name: etatFondation
              label:
                fr: "État de la fondation"
              v-if: "this.val('typeSinistre') && this.val('typeSinistre').includes('TrembTerre')"
              options:
                BonEtat:
                  fr: "Bon état, aucun dommage visible"
                DommagesMineurs:
                  fr: "Dommages mineurs (fissures superficielles)"
                DommagesMajeurs:
                  fr: "Dommages majeurs (fissures structurales, affaissement)"
                NonVerifie:
                  fr: "Non vérifié"

    # ─── Section 1 – Identité du demandeur ───────────────────────────────────
    - sectionGroup:
        fr: "1 – Renseignements sur l'identité du demandeur"
      classes: icone user
      sections:
        - section:
            fr: "Identité du demandeur"
          id: sectionDemandeur
          components:
            - type: radio
              name: civilite
              label:
                fr: Civilité
              options:
                Madame:
                  fr: Madame
                Monsieur:
                  fr: Monsieur
            - type: inline
              components:
                - type: text
                  name: prenom
                  label:
                    fr: Prénom
                - type: text
                  name: nomFamille
                  label:
                    fr: Nom
            - type: date
              name: dateNaissance
              label:
                fr: Date de naissance
              max: "{{today}}"
            - type: inline
              components:
                - type: tel
                  name: telPrincipal
                  label:
                    fr: "N° tél. (principal)"
                - type: text
                  name: postePrincipal
                  label:
                    fr: Poste
                  validations:
                    optional:
            - type: inline
              components:
                - type: tel
                  name: telAutre
                  label:
                    fr: "N° tél. (autre)"
                  validations:
                    optional:
                - type: text
                  name: posteAutre
                  label:
                    fr: Poste
                  validations:
                    optional:
            - type: email
              name: courriel
              label:
                fr: Adresse courriel
            - type: adresse
              name: adresseResidence
              label:
                fr: "Adresse de la résidence principale endommagée"
            - type: radio
              name: adresseCorrespondanceDifferente
              label:
                fr: "L'adresse de correspondance est-elle différente de celle de la résidence principale endommagée?"
              options: yesno
            - type: adresse
              name: adresseCorrespondance
              label:
                fr: Adresse de correspondance
              v-if: "this.val('adresseCorrespondanceDifferente') === 'true'"

    # ─── Section 2 – Autres occupants permanents ─────────────────────────────
    - sectionGroup:
        fr: "2 – Renseignements sur les autres occupants permanents"
      classes: icone user
      sections:
        - section:
            fr: "Autres occupants permanents et mandataires"
          id: sectionOccupants
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: dynamic
              tag: div
              classes: page-texte
              text:
                fr: |
                  <p>Énumérez tous les autres occupants permanents qui habitent dans votre résidence. Une preuve de résidence est demandée pour chacun d'eux. Énumérez également les personnes que vous avez mandatées pour agir en votre nom.</p>
                  <p>En cas de séparation ou de divorce, votre enfant pourra être admissible si vous prouvez qu'il habite effectivement chez chacun de ses deux parents. Le jugement de la cour ou un document de médiation sera alors exigé.</p>
            - type: repeatableGroup
              name: autresOccupants
              label:
                fr: Autres occupants et mandataires
              repeatable: true
              minimum: 0
              components:
                - type: inline
                  components:
                    - type: text
                      name: prenomOccupant
                      label:
                        fr: Prénom
                    - type: text
                      name: nomOccupant
                      label:
                        fr: Nom
                - type: date
                  name: dateNaissanceOccupant
                  label:
                    fr: Date de naissance
                - type: radio
                  name: estCoproprietaire
                  label:
                    fr: Copropriétaire?
                  options: yesno
                - type: text
                  name: lienParenteOccupant
                  label:
                    fr: Lien de parenté ou autre
                  validations:
                    optional:
            - type: radio
              name: nombreCoproprietaires
              label:
                fr: "Combien de copropriétaires occupants signeront ce formulaire (en plus du demandeur)?"
              options:
                Zero:
                  fr: Aucun
                Un:
                  fr: "1"
                Deux:
                  fr: "2"
                Trois:
                  fr: "3"

    # ─── Section 3 – Assurances ───────────────────────────────────────────────
    - sectionGroup:
        fr: "3 – Assurances"
      classes: icone clipboard-check
      sections:
        - section:
            fr: Assurances
          id: sectionAssurances
          components:
            - type: radio
              name: assuranceHabitation
              label:
                fr: "Aviez-vous une assurance habitation en vigueur au moment du sinistre?"
              options: yesno
            - type: avis
              classes: information
              v-if: "this.val('assuranceHabitation') === 'true'"
              text:
                fr: "<p>Fournir une copie de votre police d'assurance habitation et la réponse écrite de votre assureur pour la couverture du risque.</p>"
            - type: avis
              classes: information
              v-if: "this.val('assuranceHabitation') === 'false'"
              text:
                fr: "<p>Fournir une déclaration sous serment certifiant que vous ne possédiez pas d'assurance habitation.</p>"
            - type: customfile
              name: copieAssurance
              label:
                fr: "Joindre la police d'assurance habitation (y compris avenants et exclusions)"
              v-if: "this.val('assuranceHabitation') === 'true'"
              validations:
                mime: application/pdf,image/jpeg,image/png
            - type: customfile
              name: reponseAssureur
              label:
                fr: "Joindre la réponse écrite de votre assureur pour la couverture du sinistre"
              v-if: "this.val('assuranceHabitation') === 'true'"
              validations:
                mime: application/pdf,image/jpeg,image/png

    # ─── Section 4 – Faillite ────────────────────────────────────────────────
    - sectionGroup:
        fr: "4 – Faillite"
      classes: icone cash-dollar
      sections:
        - section:
            fr: Faillite
          id: sectionFaillite
          components:
            - type: radio
              name: enFaillite
              label:
                fr: "Est-ce que vous ou un des copropriétaires habitant la résidence êtes actuellement en faillite ou avez-vous fait cession de vos biens?"
              options: yesno
            - type: date
              name: dateLiberationFaillite
              label:
                fr: Date prévue de libération
              v-if: "this.val('enFaillite') === 'true'"
              validations:
                optional:
            - type: avis
              classes: information
              v-if: "this.val('enFaillite') === 'false'"
              text:
                fr: "<p>Vous devez informer le MSP de tout changement à cet effet.</p>"

    # ─── Section 5 – Assistance financière ───────────────────────────────────
    - sectionGroup:
        fr: "5 – Assistance financière, obtenue ou à recevoir, en lien avec le sinistre"
      classes: icone cash-dollar
      sections:
        - section:
            fr: Assistance financière reçue ou attendue
          id: sectionAssistance
          components:
            - type: radio
              name: indemnisationAssureur
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation de la part de votre assureur?"
              options: yesno
            - type: montant
              name: montantAssureur
              label:
                fr: Montant de l'indemnisation de votre assureur
              v-if: "this.val('indemnisationAssureur') === 'true'"
            - type: radio
              name: indemnisationBienfaisance
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation d'un organisme de bienfaisance?"
              options: yesno
            - type: montant
              name: montantBienfaisance
              label:
                fr: Montant de l'indemnisation de l'organisme de bienfaisance
              v-if: "this.val('indemnisationBienfaisance') === 'true'"
            - type: radio
              name: indemnisationMinistere
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation d'un ministère ou organisme public (autre que le MSP)?"
              options: yesno
            - type: montant
              name: montantMinistere
              label:
                fr: Montant de l'indemnisation du ministère ou organisme public
              v-if: "this.val('indemnisationMinistere') === 'true'"
            - type: radio
              name: indemnisationAutre
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation d'une autre source?"
              options: yesno
            - type: montant
              name: montantAutre
              label:
                fr: Montant de l'autre source
              v-if: "this.val('indemnisationAutre') === 'true'"
            - type: text
              name: provenanceAutre
              label:
                fr: Provenance de l'autre source
              v-if: "this.val('indemnisationAutre') === 'true'"
            - type: radio
              name: poursuites
              label:
                fr: "Avez-vous intenté ou avez-vous l'intention d'intenter des poursuites ou des recours collectifs contre un ou plusieurs tiers responsables de vos dommages?"
              options: yesno
            - type: avis
              classes: information
              v-if: "this.val('poursuites') === 'false'"
              text:
                fr: "<p>Vous devez informer le MSP de tout changement à cet effet.</p>"

    # ─── Section 6 – Renseignements sur la résidence ─────────────────────────
    - sectionGroup:
        fr: "6 – Renseignements relatifs à la résidence"
      classes: icone user
      sections:
        - section:
            fr: Renseignements sur la résidence
          id: sectionResidence
          components:
            - type: nombreEntier
              name: anneeConstruction
              label:
                fr: "Quelle est l'année de construction de votre résidence?"
              min: 1800
              max: 2025
            - type: inline
              components:
                - type: number
                  name: largeurResidence
                  label:
                    fr: Largeur
                - type: number
                  name: longueurResidence
                  label:
                    fr: Longueur
                - type: radio
                  name: uniteMesureResidence
                  label:
                    fr: Unité de mesure
                  options:
                    Pieds:
                      fr: Pieds
                    Metres:
                      fr: Mètres
            - type: radio
              name: zoneInondation
              label:
                fr: "Quelle est la zone de récurrence d'inondations?"
              tooltip:
                text:
                  fr: "Zone de grand courant (0-20 ans) : zone pouvant être inondée par une crue de récurrence de 20 ans. Zone de faible courant (20-100 ans) : zone pouvant être inondée par une crue de récurrence centenaire."
              options:
                HorsZone:
                  fr: Hors zone
                Rec0a20:
                  fr: "Récurrence 0-20 ans"
                Rec20a100:
                  fr: "Récurrence 20-100 ans"
                SaisPA:
                  fr: Je ne sais pas
            - type: radio
              name: typeFondations
              label:
                fr: "Quel est le type de fondations de votre résidence?"
              options:
                SousSol:
                  fr: Sous-sol
                Dalle:
                  fr: Dalle de béton au sol
                Pilotis:
                  fr: "Sur pilotis (pieux, maison mobile)"
                VideSanitaire:
                  fr: Vide sanitaire
                SaisPA:
                  fr: Je ne sais pas
            - type: radio
              name: typeIsolant
              label:
                fr: "Quel type d'isolant recouvre les murs de fondations du sous-sol ou du vide sanitaire?"
              v-if: "this.val('typeFondations') === 'SousSol' || this.val('typeFondations') === 'VideSanitaire'"
              options:
                Laine:
                  fr: Isolant de laine
                Rigide:
                  fr: Isolant rigide
                Urethane:
                  fr: Uréthane
                AucunIsolant:
                  fr: Aucun isolant
                SaisPA:
                  fr: Je ne sais pas
                NA:
                  fr: Ne s'applique pas
            - type: checkbox
              name: revetementMursFondation
              label:
                fr: "Est-ce que les murs de fondations du sous-sol sont recouverts de?"
              v-if: "this.val('typeFondations') === 'SousSol'"
              validations:
                optional:
              options:
                Gypse:
                  fr: Gypse
                Prefini:
                  fr: Panneaux de préfini
                Contreplaque:
                  fr: Contreplaqué
                Autre:
                  fr: Autre
                SaisPA:
                  fr: Je ne sais pas
                NA:
                  fr: Ne s'applique pas

    # ─── Section 7 – Renseignements relatifs à l'inondation ──────────────────
    - sectionGroup:
        fr: "7 – Renseignements relatifs à l'inondation"
      classes: icone register
      v-if: "this.val('typeSinistre') && this.val('typeSinistre').includes('Inondation')"
      sections:
        - section:
            fr: "Renseignements sur l'inondation"
          id: sectionInondation
          components:
            - type: radio
              name: causeeParDebordement
              label:
                fr: "Le sinistre a-t-il été causé par le débordement d'un cours d'eau?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
                SaisPA:
                  fr: Je ne sais pas
            - type: text
              name: nomCoursEau
              label:
                fr: "Nom du cours d'eau"
              v-if: "this.val('causeeParDebordement') === 'Oui'"
            - type: radio
              name: eauAtteintTerrain
              label:
                fr: "Est-ce que l'eau provenant du cours d'eau a atteint votre terrain?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
                SaisPA:
                  fr: Je ne sais pas
                NA:
                  fr: Ne s'applique pas
            - type: radio
              name: eauAtteintResidence
              label:
                fr: "Est-ce que l'eau provenant du cours d'eau a atteint votre résidence?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
                SaisPA:
                  fr: Je ne sais pas
                NA:
                  fr: Ne s'applique pas
            - type: checkbox
              name: typeInfiltration
              label:
                fr: "Comment l'eau s'est-elle infiltrée à l'intérieur de votre résidence?"
              options:
                SaisPA:
                  fr: Je ne sais pas
                ParOuverture:
                  fr: Infiltration par une ouverture
                AucuneInfiltration:
                  fr: Aucune infiltration
                RefoulementDrain:
                  fr: Refoulement par le drain du plancher ou par le puits de captation
                ParFissure:
                  fr: Infiltration par une fissure
                RefoulementEgout:
                  fr: "Refoulement d'égout"
                ParPlancher:
                  fr: Infiltration par le plancher
                Autre:
                  fr: Autre
            - type: dynamic
              tag: p
              text:
                fr: "<strong>Niveau maximal d'eau atteint</strong>"
            - type: inline
              components:
                - type: text
                  name: niveauEauVideSanitaire
                  label:
                    fr: Au vide sanitaire
                  validations:
                    optional:
                - type: text
                  name: niveauEauSousSol
                  label:
                    fr: Au sous-sol
                  validations:
                    optional:
                - type: text
                  name: niveauEauRDC
                  label:
                    fr: Au rez-de-chaussée
                  validations:
                    optional:
            - type: radio
              name: uniteNiveauEau
              label:
                fr: Unité de mesure utilisée
              options:
                Pouces:
                  fr: Pouces
                Pieds:
                  fr: Pieds
                Centimetres:
                  fr: Centimètres
                Metres:
                  fr: Mètres
            - type: radio
              name: dureeEauResidence
              label:
                fr: "Combien de temps l'eau est-elle demeurée dans votre résidence?"
              options:
                Moins12h:
                  fr: Moins de 12 heures
                De12a24h:
                  fr: De 12 à 24 heures
                De24a48h:
                  fr: De 24 à 48 heures
                Plus48h:
                  fr: Plus de 48 heures
                SaisPA:
                  fr: Je ne sais pas
                NA:
                  fr: Ne s'applique pas

    # ─── Section 8 – Réclamation ──────────────────────────────────────────────
    - sectionGroup:
        fr: "8 – Réclamation"
      classes: icone cash-dollar
      sections:

        # 8A – Pièces admissibles endommagées
        - section:
            fr: "A – Pièces admissibles endommagées"
          id: sectionPieces
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: dynamic
              tag: div
              classes: page-texte
              text:
                fr: |
                  <p>Veuillez sélectionner les pièces admissibles ayant été touchées par le sinistre. Précisez leur emplacement dans la résidence et si celles-ci ont un recouvrement de sol (bois franc, bois d'ingénierie, bois flottant, céramique, vinyle, tapis, etc.).</p>
            - type: repeatableGroup
              name: piecesEndommagees
              label:
                fr: Pièces endommagées
              repeatable: true
              minimum: 0
              components:
                - type: listeDeroulante
                  name: nomPiece
                  label:
                    fr: Pièce
                  options: typesPieces
                - type: radio
                  name: emplacementPiece
                  label:
                    fr: Emplacement
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: Rez-de-chaussée (RDC)
                - type: radio
                  name: recouvrementSol
                  label:
                    fr: Recouvrement de sol
                  options:
                    Avec:
                      fr: Avec recouvrement de sol
                    Sans:
                      fr: Sans recouvrement de sol

        # 8B – Dommages aux biens meubles admissibles
        - section:
            fr: "B – Dommages aux biens meubles admissibles"
          id: sectionBiensMeubles
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: dynamic
              tag: div
              classes: page-texte
              text:
                fr: |
                  <p>Veuillez sélectionner, parmi les biens meubles admissibles suivants, ceux qui ont été endommagés par le sinistre ou qui sont rendus inaccessibles de manière définitive. Indiquez le montant réclamé et l'emplacement. L'indemnité pour les biens avec astérisque (*) est limitée au montant indiqué sans dépasser la valeur maximale.</p>

            # Catégorie 1 – Cuisine et salle à manger (par cuisine/salle à manger)
            - type: dynamic
              tag: h3
              text:
                fr: "1. Cuisine et salle à manger (montant par cuisine et salle à manger)"
            - type: inline
              components:
                - type: montant
                  name: bm_cuisiniere
                  label:
                    fr: "Cuisinière ou four et plaque de cuisson (max 1 200 $)"
                  validations:
                    optional:
                    max: 1200
                - type: radio
                  name: bm_cuisiniere_emp
                  label:
                    fr: Emplacement
                  v-if: "parseFloat(this.val('bm_cuisiniere')) > 0"
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: RDC
            - type: inline
              components:
                - type: montant
                  name: bm_refrigerateur
                  label:
                    fr: "Réfrigérateur (max 1 300 $)"
                  validations:
                    optional:
                    max: 1300
                - type: radio
                  name: bm_refrigerateur_emp
                  label:
                    fr: Emplacement
                  v-if: "parseFloat(this.val('bm_refrigerateur')) > 0"
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: RDC
            - type: inline
              components:
                - type: montant
                  name: bm_laveVaisselle
                  label:
                    fr: "Lave-vaisselle (max 800 $)"
                  validations:
                    optional:
                    max: 800
                - type: radio
                  name: bm_laveVaisselle_emp
                  label:
                    fr: Emplacement
                  v-if: "parseFloat(this.val('bm_laveVaisselle')) > 0"
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: RDC
            - type: inline
              components:
                - type: montant
                  name: bm_tableChaises
                  label:
                    fr: "Table et quatre chaises (max 1 100 $)"
                  validations:
                    optional:
                    max: 1100
                - type: radio
                  name: bm_tableChaises_emp
                  label:
                    fr: Emplacement
                  v-if: "parseFloat(this.val('bm_tableChaises')) > 0"
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: RDC
            - type: inline
              components:
                - type: montant
                  name: bm_batterieCuisine
                  label:
                    fr: "Batterie de cuisine (max 200 $)"
                  validations:
                    optional:
                    max: 200
                - type: radio
                  name: bm_batterieCuisine_emp
                  label:
                    fr: Emplacement
                  v-if: "parseFloat(this.val('bm_batterieCuisine')) > 0"
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: RDC
            - type: inline
              components:
                - type: montant
                  name: bm_microOndes
                  label:
                    fr: "Four micro-ondes (max 250 $)"
                  validations:
                    optional:
                    max: 250
                - type: radio
                  name: bm_microOndes_emp
                  label:
                    fr: Emplacement
                  v-if: "parseFloat(this.val('bm_microOndes')) > 0"
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: RDC
            - type: inline
              components:
                - type: montant
                  name: bm_petitsAppElec
                  label:
                    fr: "Petits appareils électroménagers* (max 1 000 $)"
                  validations:
                    optional:
                    max: 1000
                - type: radio
                  name: bm_petitsAppElec_emp
                  label:
                    fr: Emplacement
                  v-if: "parseFloat(this.val('bm_petitsAppElec')) > 0"
                  options:
                    SousSol:
                      fr: Sous-sol
