                e4:
                  fr: "Je comprends que le gouvernement du Québec est subrogé de plein droit dans mes droits et recours contre le tiers responsable."
                e5:
                  fr: "Je comprends que je peux demander une analyse pour réduire ou abolir ma participation financière si ma situation est précaire."
                e6:
                  fr: "Je comprends les obligations relatives aux licences des entrepreneurs (Régie du bâtiment du Québec)."
                e7:
                  fr: "Je comprends que le MSP peut récupérer l'assistance versée si l'entrepreneur n'a pas la licence requise."
                e8:
                  fr: "Je comprends et j'accepte les conditions du programme, solidairement avec les autres propriétaires."
                e9:
                  fr: "Je déclare que tous les renseignements fournis sont véridiques et complets."
              validations:
                min: 9
