            - type: customfile
              name: photosVideos
              label:
                fr: Photographies et vidéos des dommages (si possible)
              validations:
                optional:
                mime: application/pdf,image/jpeg,image/png,video/mp4,video/quicktime
            - type: customfile
              name: specimenCheque
              label:
                fr: Spécimen de chèque (si possible)
              validations:
                optional:
                mime: application/pdf,image/jpeg,image/png
            - type: customfile
              name: facturesEstimations
              label:
                fr: "Factures ou estimations pour la réparation ou le remplacement des biens endommagés (si disponibles)"
              validations:
                optional:
                mime: application/pdf,image/jpeg,image/png

