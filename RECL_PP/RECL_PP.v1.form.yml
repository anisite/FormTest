        # 8C – Mesures préventives temporaires
        - section:
            fr: "C – Mesures préventives temporaires"
          id: sectionMesuresPreventives
          components:
            - type: radio
              name: mesuresPreventives
              label:
                fr: "Avez-vous mis en place des mesures préventives temporaires avant et/ou pendant le sinistre afin d'éviter ou de limiter les dommages à vos biens?"
              options: yesno
            - type: inline
              v-if: "this.val('mesuresPreventives') === 'true'"
              components:
                - type: date
                  name: dateMesuresDebut
                  label:
                    fr: "Ces mesures ont été mises en place du"
                - type: date
                  name: dateMesuresFin
                  label:
                    fr: au
            - type: checkbox
              name: typesMesuresPreventives
              label:
                fr: Veuillez indiquer lesquelles
              v-if: "this.val('mesuresPreventives') === 'true'"
              options:
                SacsSable:
                  fr: Installation de sacs de sable
                SurElevation:
                  fr: "Surélévation des biens meubles et des appareils mécaniques ou électriques"
                Deplacement:
                  fr: "Déplacement des biens à l'étage supérieur"
                Placardage:
                  fr: Placardage des portes et des fenêtres
                Digue:
                  fr: "Érection d'une digue, d'un remblai ou d'un enrochement temporaire"
                Fosse:
                  fr: "Creusage d'un fossé"
                Pompe:
                  fr: "Installation ou surveillance de pompe(s)"
                Autre:
                  fr: Autre mesure
            - type: text
              name: autresMesuresDetail
              label:
                fr: "Précisez l'autre mesure"
              v-if: "this.val('typesMesuresPreventives') && this.val('typesMesuresPreventives').includes('Autre')"

        # 8D – Frais excédentaires d'hébergement temporaire et de ravitaillement
        - section:
            fr: "D – Frais excédentaires d'hébergement temporaire et de ravitaillement"
          id: sectionHebergement
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: radio
              name: evacuationResidence
              label:
                fr: "Avez-vous évacué votre résidence en raison du sinistre?"
              options: yesno
            - type: radio
              name: aideCroixRouge
              label:
                fr: "Avez-vous été ou êtes-vous actuellement hébergé avec l'aide de la Croix-Rouge canadienne?"
              v-if: "this.val('evacuationResidence') === 'true'"
