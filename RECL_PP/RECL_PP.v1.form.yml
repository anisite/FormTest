    # ─── Section 11 – Confirmation de transmission ───────────────────────────
    - sectionGroup:
        fr: "11 – Confirmation et transmission"
      classes: icone clipboard-check
      sections:
        - section:
            fr: Confirmation
          id: sectionConfirmation
          components:
            - type: avis
              classes: information
              text:
                fr: |
                  <p>En transmettant ce formulaire électroniquement, le demandeur et les copropriétaires confirment avoir pris connaissance des sections 9 (Consentements) et 10 (Engagements et déclarations) et y avoir consenti.</p>
                  <p>La transmission électronique du formulaire tient lieu de signature conformément aux conditions acceptées ci-dessus.</p>
                  <p><strong>Rappel :</strong> La demande d'assistance financière doit être expédiée dans les <strong>12 mois</strong> suivant la date de la mise en œuvre du programme. Consultez <a href="https://www.quebec.ca/sinistresadmissibles">www.quebec.ca/sinistresadmissibles</a> pour vérifier la date limite.</p>
        - section:
            fr: Révision
          id: revision
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: dynamic
              tag: div
              v-if: "this.val('EtatRevision') === 'initial'"
              classes: texte-revision
              text:
                fr: |
                  Cliquez sur le bouton « Valider » afin de vérifier que le formulaire est rempli correctement avant de le transmettre.
            - type: dynamic
              tag: div
              v-if: "this.val('EtatRevision') === 'sans-erreur'"
              classes: texte-revision
              text:
                fr: Tout est en ordre ! Vous pouvez transmettre votre formulaire.
            - type: dynamic
              tag: div
              v-if: "this.val('EtatRevision') === 'avec-erreur'"
              classes: texte-revision
              text:
                fr: |
                  Des erreurs ont été détectées. Veuillez les corriger avant de transmettre votre formulaire.
