    # ─── Section 10 – Engagements et déclarations ────────────────────────────
    - sectionGroup:
        fr: "Engagements et déclarations"
      classes: icone clipboard-check
      sections:
        - section:
            fr: "10 – Engagements et déclarations du demandeur et des copropriétaires (obligatoires)"
          id: sectionEngagements
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: avis
              classes: information
              text:
                fr: "<p>Le demandeur et les copropriétaires occupants doivent consentir à chacun des énoncés de la présente section pour que le MSP puisse traiter la demande.</p>"
            - type: checkbox
              name: engagementsDemandeur
              label:
                fr: "Engagements du demandeur — cocher tous les énoncés"
              options:
                e1:
                  fr: "Je m'engage à fournir au MSP tous les renseignements et les documents qu'il demande aux fins de l'administration du programme au plus tard le 30e jour suivant l'envoi d'une demande écrite à cet effet."
                e2:
                  fr: "Je m'engage à permettre au MSP d'examiner dans les meilleurs délais les lieux ou les biens concernés par le sinistre."
                e3:
                  fr: "Je m'engage à informer le MSP de tout changement dans ma situation susceptible d'influer sur mon admissibilité au programme ou sur l'assistance financière qui peut m'être accordée."
                e4:
                  fr: "Je comprends que le gouvernement du Québec est subrogé de plein droit jusqu'à concurrence des sommes qu'il a versées, dans tous mes droits et recours contre le tiers responsable du dommage ou de l'événement qui fait l'objet du programme."
                e5:
                  fr: "Je comprends que, si ma situation financière est précaire au moment du sinistre ou si j'éprouve des difficultés financières en raison du sinistre, je peux demander qu'une analyse soit effectuée afin de déterminer s'il est possible de réduire ou d'abolir la participation financière s'appliquant à la présente demande."
                e6:
                  fr: "Je comprends que si j'engage un entrepreneur pour effectuer des travaux nécessaires, je dois m'assurer que la licence qu'il possède a été délivrée par la Régie du bâtiment du Québec, qu'elle est toujours valide et qu'elle lui permet d'effectuer les travaux indiqués dans le constat de dommages."
                e7:
                  fr: "Je comprends que dans le cas où des travaux seraient effectués par un entrepreneur et que ce dernier ne posséderait pas la licence requise, le MSP pourrait récupérer en partie ou en totalité l'assistance financière versée, s'il y a lieu."
                e8:
                  fr: "Je comprends et j'accepte que si je ne respecte pas l'une des conditions du programme, le gouvernement pourra me réclamer la totalité ou une partie de l'assistance financière versée, s'il juge que la situation le requiert, et ce, solidairement avec l'autre ou les autres propriétaires qui ont reçu cette assistance."
                e9:
                  fr: "Je déclare que tous les renseignements fournis dans ce formulaire de réclamation sont véridiques et complets."
              validations:
                min: 9
