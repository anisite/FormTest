        - section:
            fr: "9 – Consentements : communication et vérification des renseignements personnels auprès de tiers (obligatoires)"
          id: sectionConsentements
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: avis
              classes: information
              text:
                fr: "<p>Le demandeur et les copropriétaires occupants doivent consentir à chacun des énoncés de la présente section pour que le MSP puisse traiter la demande.</p>"
            - type: checkbox
              name: consentementsDemandeur
              label:
                fr: "Consentements du demandeur — cocher tous les énoncés"
              options:
                c1:
                  fr: "Je consens à ce que le MSP vérifie mon adresse de résidence principale et l'historique de mes changements d'adresse par le numéro de permis de conduire à la Société de l'assurance automobile du Québec; mon adresse de résidence principale et le détail de mon revenu total auprès de Revenu Québec; ainsi que mon adresse et la composition de mon unité familiale auprès du MESS."
                c2:
                  fr: "Je consens à ce que le MSP vérifie toute somme reçue de programmes d'assistance financière mis en vigueur par des ministères et des organismes publics, notamment le MESS et la Société d'habitation du Québec, ainsi que toute aide reçue de la Croix-Rouge canadienne."
                c3:
                  fr: "Je consens à ce que le MSP utilise des renseignements personnels me concernant pour faire des vérifications auprès de toute compagnie d'assurance contribuant au traitement de la présente demande."
                c4:
                  fr: "Je consens à ce que le MSP utilise des renseignements personnels me concernant pour faire des vérifications auprès de tout fournisseur de services professionnels contribuant au traitement de la présente demande (entrepreneur, firme d'arpentage, firme d'ingénierie, firme de comptables)."
