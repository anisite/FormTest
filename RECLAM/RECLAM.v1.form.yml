            fr: "Nombre de copropriétaires"
          id: sectionNombreCoprop
          components:
            - type: radio
              name: nombreCoproprietaires
              label:
                fr: "Combien de copropriétaires occupent la résidence principale endommagée ?"
              options:
                Aucun:
