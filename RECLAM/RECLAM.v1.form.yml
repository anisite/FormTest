      Trois:
        label:
          fr: 3 copropriétaires
    emplacementBien:
      SousSol:
        label:
          fr: Sous-sol
      RDC:
        label:
          fr: "Rez-de-chaussée"
      LesDeux:
        label:
          fr: "Sous-sol et rez-de-chaussée"
      GarCab:
        label:
          fr: "Garage / Cabanon"
    typesPieces:
      Salon:
        label:
          fr: Salon
      SalleFamiliale:
        label:
          fr: Salle familiale
      Cuisine:
        label:
          fr: Cuisine
      SalleAManger:
        label:
          fr: Salle à manger
      SalleDeBain:
        label:
          fr: Salle de bain
      SalleDeau:
        label:
          fr: "Salle d'eau"
      SalleDeLavage:
        label:
          fr: Salle de lavage
      Chambre1:
        label:
          fr: Chambre 1
      Chambre2:
        label:
          fr: Chambre 2
      Chambre3:
        label:
          fr: Chambre 3
      Chambre4:
        label:
          fr: Chambre 4
      Bureau:
        label:
          fr: Bureau
      Autre:
        label:
          fr: Autre

form:
  title:
    fr: "Formulaire de réclamation – Particulier – Propriétaire"

  sectionsGroup:

    # ─── Renseignements généraux ───────────────────────────────────────────────
    - sectionGroup:
        fr: Renseignements généraux
      classes: icone register
      sections:
        - section:
            fr: À lire avant de commencer
          id: sectionIntro
          cacherTexteExplicatifChampsObligatoires: true
          components:
            - type: dynamic
              tag: div
              classes: page-texte
              text:
                fr: |
                  <p>Les programmes du ministère de la Sécurité publique (MSP) visent notamment à indemniser et à aider financièrement les particuliers qui ont pris des mesures préventives temporaires, dont les biens ont subi des dommages lors d'un sinistre ou dont la résidence principale est menacée par une imminence de submersion, d'érosion ou de mouvement de sol.</p>
                  <p>Ces dommages doivent être relatifs à la <strong>résidence principale</strong> du particulier, dont il est propriétaire, et être causés par un sinistre admissible comme des inondations occasionnées par des débordements de cours d'eau, l'érosion de berges, la submersion, les glissements de terrain et les tremblements de terre. On entend par « résidence principale » le lieu où un particulier effectue l'ensemble de ses activités quotidiennes sur une base annuelle (p. ex., un logement, une maison unifamiliale, un duplex, une maison jumelée, une maison en rangée ou un appartement en copropriété).</p>
                  <p>Pour faire une demande d'assistance financière, le ou les propriétaires occupants inscrits sur l'évaluation municipale en vigueur au moment du sinistre doivent remplir chacune des sections du présent formulaire, lire attentivement les sections 9 et 10, cocher chacun des énoncés, puis transmettre le formulaire et tous les documents demandés.</p>
                  <p>Au besoin, communiquez avec le MSP au :<br>
                  <strong>418 643-AIDE (2433)</strong> (région de Québec)<br>
                  <strong>1 888 643-AIDE (2433)</strong> (extérieur)</p>
                  <p><strong>La demande d'assistance financière doit être expédiée dans les 12 mois</strong> suivant la date de la mise en œuvre du programme. Pour vérifier cette date, consultez <a href="https://www.quebec.ca/sinistresadmissibles">www.quebec.ca/sinistresadmissibles</a>.</p>
            - type: avis
              classes: information
              text:
                fr: |
                  <p><strong>Documents à joindre</strong></p>
                  <ul>
                    <li>Une preuve de l'adresse de résidence des occupants permanents en vigueur au moment du sinistre (p. ex., permis de conduire, bulletin scolaire d'un enfant, avis de cotisation de Revenu Québec ou de l'Agence du revenu du Canada ou tout autre document provenant du gouvernement provincial ou fédéral et daté d'avant le sinistre)</li>
                    <li>Une copie de l'avis d'évaluation municipale de la résidence en vigueur au moment du sinistre</li>
                    <li>Une copie de la police d'assurance habitation en vigueur au moment du sinistre, y compris les avenants et les exclusions. En l'absence d'une telle assurance, fournir une déclaration signée à cet effet par un commissaire à l'assermentation</li>
                    <li>Une copie de la réponse écrite de votre assureur pour la couverture du sinistre</li>
                    <li>Une copie des factures ou les estimations pour la réparation ou le remplacement des biens endommagés, lorsque requis</li>
                    <li>Des photographies et des vidéos des dommages, si possible</li>
                    <li>Un spécimen de chèque, si possible</li>
                  </ul>

    # ─── Sinistre ──────────────────────────────────────────────────────────────
    - sectionGroup:
        fr: Sinistre
      classes: icone register
      sections:
        - section:
            fr: Informations sur le sinistre
          id: sectionSinistre
          components:
            - type: avis
              classes: information
              text:
                fr: "<p>Lors d'une inondation, la date du sinistre correspond généralement à la date où l'eau a commencé à s'accumuler sur votre terrain ou dans votre résidence.</p>"
            - type: date
              name: dateSinistre
              label:
                fr: Date du sinistre
              max: "{{today}}"
            - type: checkbox
              name: typeSinistre
              label:
                fr: Type de sinistre
              options:
                Inondation:
                  fr: Inondation
                MouvementSol:
                  fr: "Mouvement de sol, érosion ou submersion"
                TrembTerre:
                  fr: Tremblement de terre
                Verglas:
                  fr: Verglas
                Autre:
                  fr: Autre
            - type: text
              name: typeSinistreAutre
              label:
                fr: "Précisez le type de sinistre"
              v-if: "this.val('typeSinistre') && this.val('typeSinistre').includes('Autre')"
            - type: text
              name: typeSinistreTest
              label:
                fr: "Précisez de quel test il s'agit"
              v-if: "this.val('typeSinistre') && this.val('typeSinistre').includes('Test')"

    # ─── Section 1 – Identité du demandeur ────────────────────────────────────
    - sectionGroup:
        fr: "Renseignements sur l'identité du demandeur"
      classes: icone user
      sections:
        - section:
            fr: "Identité du demandeur"
          id: sectionDemandeur
          components:
            - type: avis
              classes: information
              text:
                fr: "<p>Vous devez être le propriétaire ou un des propriétaires inscrits sur l'avis d'évaluation municipale de la résidence principale endommagée.</p>"
            - type: radio
              name: civilite
              label:
                fr: Civilité
              options:
                Madame:
                  fr: Madame
                Monsieur:
                  fr: Monsieur
            - type: inline
              components:
                - type: text
                  name: prenom
                  label:
                    fr: Prénom
                - type: text
                  name: nomFamille
                  label:
                    fr: Nom
            - type: date
              name: dateNaissance
              label:
                fr: Date de naissance
              max: "{{today}}"
            - type: inline
              components:
                - type: tel
                  name: telephonePrincipal
                  label:
                    fr: "N° tél. (principal)"
                - type: tel
                  name: telephoneAutre
                  label:
                    fr: "N° tél. (autre)"
                  validations:
                    optional:
            - type: text
              name: courriel
              label:
                fr: Adresse courriel
              validations:
                email:
                optional:

        - section:
            fr: "Adresse de la résidence principale endommagée"
          id: sectionAdresseResidence
          components:
            - type: inline
              components:
                - type: text
                  name: adresseResidence
                  label:
                    fr: Adresse
                - type: text
                  name: casePostaleResidence
                  label:
                    fr: "Case postale"
                  validations:
                    optional:
            - type: inline
              components:
                - type: text
                  name: municipaliteResidence
                  label:
                    fr: Municipalité
                - type: text
                  name: codePostalResidence
                  label:
                    fr: Code postal
            - type: customfileUlterieure
              name: docEvaluationMunicipale
              label:
                fr: "Copie de l'avis d'évaluation municipale en vigueur au moment du sinistre"
            - type: radio
              name: adresseCorrespondanceDifferente
              label:
                fr: "Votre adresse de correspondance est-elle différente de celle de la résidence principale endommagée ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non

        - section:
            fr: "Adresse de correspondance"
          id: sectionAdresseCorrespondance
          v-if: "this.val('adresseCorrespondanceDifferente') === 'Oui'"
          components:
            - type: inline
              components:
                - type: text
                  name: adresseCorrespondance
                  label:
                    fr: Adresse
                - type: text
                  name: casePostaleCorrespondance
                  label:
                    fr: "Case postale"
                  validations:
                    optional:
            - type: inline
              components:
                - type: text
                  name: municipaliteCorrespondance
                  label:
                    fr: Municipalité
                - type: text
                  name: codePostalCorrespondance
                  label:
                    fr: Code postal

    # ─── Section 2 – Autres occupants permanents ──────────────────────────────
    - sectionGroup:
        fr: "Renseignements sur les autres occupants permanents et mandataires"
      classes: icone user
      sections:
        - section:
            fr: "Autres occupants et mandataires"
          id: sectionOccupants
          components:
            - type: dynamic
              tag: div
              classes: page-texte
              text:
                fr: |
                  <p>Énumérez tous les autres occupants permanents qui habitent dans votre résidence. Une preuve de résidence est demandée pour chacun d'eux. Énumérez également les personnes que vous avez mandatées pour agir en votre nom dans le cadre de cette demande d'assistance financière.</p>
                  <p>En cas de séparation ou de divorce, votre enfant pourra être admissible, peu importe le lieu de sa résidence principale, si vous prouvez qu'il habite effectivement chez chacun de ses deux parents. Le jugement de la cour ou un document de médiation sera alors exigé.</p>
                  <p>La preuve de résidence doit contenir le nom et l'adresse de l'occupant et elle doit être en vigueur ou dater d'au plus un an avant le sinistre.</p>
            - type: radio
              name: autresOccupantsPresents
              label:
                fr: "Y a-t-il d'autres occupants permanents ou mandataires dans votre résidence ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: repeatableGroup
              name: autresOccupants
              label:
                fr: "Autres occupants et mandataires"
              v-if: "this.val('autresOccupantsPresents') === 'Oui'"
              repeatable: true
              minimum: 0
              components:
                - type: inline
                  components:
                    - type: text
                      name: occupantPrenom
                      label:
                        fr: Prénom
                    - type: text
                      name: occupantNom
                      label:
                        fr: Nom
                - type: date
                  name: occupantDateNaissance
                  label:
                    fr: Date de naissance
                  max: "{{today}}"
                - type: radio
                  name: occupantCoproprietaire
                  label:
                    fr: Copropriétaire ?
                  options:
                    Oui:
                      fr: Oui
                    Non:
                      fr: Non
                - type: text
                  name: occupantLien
                  label:
                    fr: "Lien de parenté ou autre"
                  validations:
                    optional:
                - type: customfileUlterieure
                  name: occupantPreuveResidence
                  label:
                    fr: "Preuve de résidence"

    # ─── Section 3 – Assurances ────────────────────────────────────────────────
    - sectionGroup:
        fr: Assurances
      classes: icone cash-dollar
      sections:
        - section:
            fr: "3.1 – Assurance habitation"
          id: sectionAssurances
          components:
            - type: radio
              name: assuranceHabitation
              label:
                fr: "Aviez-vous une assurance habitation en vigueur au moment du sinistre ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: avis
              classes: information
              v-if: "this.val('assuranceHabitation') === 'Oui'"
              text:
                fr: "<p>Veuillez joindre une copie de votre police d'assurance habitation et la réponse écrite de votre assureur pour la couverture du risque.</p>"
            - type: customfileUlterieure
              name: docPoliceAssurance
              label:
                fr: "Police d'assurance habitation et réponse de l'assureur"
              v-if: "this.val('assuranceHabitation') === 'Oui'"
            - type: avis
              classes: information
              v-if: "this.val('assuranceHabitation') === 'Non'"
              text:
                fr: "<p>Veuillez joindre une déclaration sous serment certifiant que vous ne possédiez pas d'assurance habitation.</p>"
            - type: customfileUlterieure
              name: docDeclarationSousSerment
              label:
                fr: "Déclaration sous serment certifiant l'absence d'assurance habitation"
              v-if: "this.val('assuranceHabitation') === 'Non'"

    # ─── Section 4 – Faillite ─────────────────────────────────────────────────
    - sectionGroup:
        fr: Faillite
      classes: icone register
      sections:
        - section:
            fr: "4.1 – Situation de faillite"
          id: sectionFaillite
          components:
            - type: avis
              classes: information
              text:
                fr: |
                  <p>Si vous avez fait faillite ou si vous avez fait cession de vos biens, vous n'êtes pas admissible à une aide pour remettre la résidence en état. Toutefois, vous pourriez recevoir une assistance financière pour les frais excédentaires d'hébergement temporaire ou de ravitaillement, vos biens meubles admissibles, les mesures préventives temporaires mises en place ainsi que les travaux d'urgence effectués.</p>
                  <p>Lorsque le syndic renonce à tous droits, titres et intérêts qu'il détient dans la résidence, conformément à l'article 20 de la <em>Loi sur la faillite et l'insolvabilité</em> (LRC (1985), c. B-3), le MSP peut accorder une assistance au propriétaire d'une résidence pour les dommages à celle-ci et à son chemin d'accès.</p>
                  <p>Si vous êtes libéré de votre faillite, vous redevenez admissible, sous réserve des dispositions prévues au programme.</p>
            - type: radio
              name: enFaillite
              label:
                fr: "Êtes-vous, ou un des copropriétaires habitant la résidence, actuellement en faillite ou avez-vous fait cession de vos biens ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: date
              name: datePrevueLiberationFaillite
              label:
                fr: "Date prévue de libération"
              v-if: "this.val('enFaillite') === 'Oui'"
              validations:
                optional:
            - type: avis
              classes: avertissement
              v-if: "this.val('enFaillite') === 'Non'"
              text:
                fr: "<p>Vous devez informer le MSP de tout changement à cet effet.</p>"

    # ─── Section 5 – Assistance financière ───────────────────────────────────
    - sectionGroup:
        fr: "Assistance financière, obtenue ou à recevoir, en lien avec le sinistre"
      classes: icone cash-dollar
      sections:
        - section:
            fr: "5.1 – Indemnisations reçues ou attendues"
          id: sectionAssistanceFinanciere
          components:
            - type: avis
              classes: information
              text:
                fr: "<p>L'assistance financière est une aide de dernier recours. Par conséquent, vous devez divulguer au MSP toutes sommes que vous avez reçues en lien avec le sinistre.</p>"
            - type: radio
              name: indemnisationAssureur
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation de la part de votre assureur ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: number
              name: indemnisationAssureurMontant
              label:
                fr: "Montant de l'assureur ($)"
              v-if: "this.val('indemnisationAssureur') === 'Oui'"
            - type: avis
              classes: information
              v-if: "this.val('indemnisationAssureur') === 'Oui'"
              text:
                fr: "<p>Veuillez fournir une copie du règlement de votre assureur.</p>"
            - type: customfileUlterieure
              name: docReglementAssureur
              label:
                fr: "Copie du règlement de l'assureur"
              v-if: "this.val('indemnisationAssureur') === 'Oui'"
            - type: radio
              name: indemnisationOrganisme
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation d'un organisme de bienfaisance ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: number
              name: indemnisationOrganismeMontant
              label:
                fr: "Montant de l'organisme de bienfaisance ($)"
              v-if: "this.val('indemnisationOrganisme') === 'Oui'"
            - type: radio
              name: indemnisationMinistere
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation d'un ministère ou organisme public (autre que le MSP) ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: number
              name: indemnisationMinistereMontant
              label:
                fr: "Montant du ministère ou organisme public ($)"
              v-if: "this.val('indemnisationMinistere') === 'Oui'"
            - type: radio
              name: indemnisationAutreSource
              label:
                fr: "Avez-vous reçu ou attendez-vous une indemnisation d'une autre source ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: inline
              v-if: "this.val('indemnisationAutreSource') === 'Oui'"
              components:
                - type: number
                  name: indemnisationAutreSourceMontant
                  label:
                    fr: "Montant ($)"
                - type: text
                  name: indemnisationAutreSourceProvenance
                  label:
                    fr: "Provenance"

        - section:
            fr: "5.2 – Poursuites contre des tiers"
          id: sectionPoursuites
          components:
            - type: radio
              name: poursuitesTiers
              label:
                fr: "Avez-vous intenté ou avez-vous l'intention d'intenter des poursuites ou des recours collectifs contre un ou plusieurs tiers responsables de vos dommages ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: avis
              classes: avertissement
              v-if: "this.val('poursuitesTiers') === 'Non'"
              text:
                fr: "<p>Vous devez informer le MSP de tout changement à cet effet.</p>"

    # ─── Section 6 – Renseignements sur la résidence ──────────────────────────
    - sectionGroup:
        fr: "Renseignements relatifs à la résidence"
      classes: icone register
      sections:
        - section:
            fr: "Caractéristiques de la résidence"
          id: sectionResidence
          components:
            - type: avis
              classes: information
              text:
                fr: |
                  <p><strong>Dimensions approximatives de la résidence :</strong> si la résidence est de forme irrégulière, veuillez indiquer ses dimensions de façon approximative. Au besoin, la personne mandatée par le MSP qui ira constater et/ou évaluer les dommages à votre résidence prendra les mesures réelles de celle-ci.</p>
                  <p><strong>Zone de récurrence d'inondations :</strong> la plaine inondable est l'espace occupé par un lac ou un cours d'eau en période de crue. Elle est constituée de deux zones :<br>
                  — <strong>Zone de grand courant (0-20 ans)</strong> : zone pouvant être inondée par une crue de récurrence de 20 ans.<br>
                  — <strong>Zone de faible courant (20-100 ans)</strong> : partie de la plaine inondable s'étendant jusqu'à la limite de la zone pouvant être inondée par une crue centenaire.</p>
            - type: number
              name: anneeConstruction
              label:
                fr: "6.1 – Année de construction de la résidence"
            - type: inline
              components:
                - type: number
                  name: dimensionLargeur
                  label:
                    fr: "6.2 – Largeur (approximative)"
                - type: number
                  name: dimensionLongueur
                  label:
                    fr: Longueur (approximative)
            - type: radio
              name: dimensionUnite
              label:
                fr: "Unité de mesure utilisée"
              options:
                Pieds:
                  fr: Pieds
                Metres:
                  fr: Mètres
            - type: radio
              name: zoneRecurrence
              label:
                fr: "6.3 – Zone de récurrence d'inondations"
              options:
                HorsZone:
                  fr: Hors zone
                R0a20:
                  fr: "Récurrence 0-20 ans"
                R20a100:
                  fr: "Récurrence 20-100 ans"
                NeSaitPas:
                  fr: Je ne sais pas
            - type: radio
              name: typeFondations
              label:
                fr: "6.4 – Type de fondations de la résidence"
              options:
                SousSol:
                  fr: Sous-sol
                DalleBeton:
                  fr: Dalle de béton au sol
                Pilotis:
                  fr: "Sur pilotis (pieux, maison mobile)"
                VideSanitaire:
                  fr: Vide sanitaire
                NeSaitPas:
                  fr: Je ne sais pas
            - type: radio
              name: typeIsolant
              label:
                fr: "6.5 – Type d'isolant recouvrant les murs de fondations du sous-sol ou du vide sanitaire"
              v-if: "this.val('typeFondations') === 'SousSol' || this.val('typeFondations') === 'VideSanitaire'"
              options:
                IsolantLaine:
                  fr: Isolant de laine
                IsolantRigide:
                  fr: Isolant rigide
                Urethane:
                  fr: Uréthane
                AucunIsolant:
                  fr: Aucun isolant
                NeSaitPas:
                  fr: Je ne sais pas
                NeApplique:
                  fr: "Ne s'applique pas"
            - type: radio
              name: revetementMursFondation
              label:
                fr: "6.6 – Revêtement des murs de fondations du sous-sol"
              v-if: "this.val('typeFondations') === 'SousSol'"
              options:
                Gypse:
                  fr: Gypse
                PanneauxPrefini:
                  fr: Panneaux de préfini
                Contreplaque:
                  fr: Contreplaqué
                Autre:
                  fr: Autre
                NeSaitPas:
                  fr: Je ne sais pas
                NeApplique:
                  fr: "Ne s'applique pas"

    # ─── Section 7 – Renseignements relatifs à l'inondation ──────────────────
    - sectionGroup:
        fr: "Renseignements relatifs à l'inondation"
      classes: icone register
      v-if: "this.val('typeSinistre') && (this.val('typeSinistre').includes('Inondation') || this.val('typeSinistre').includes('MouvementSol'))"
      sections:
        - section:
            fr: "Caractéristiques de l'inondation"
          id: sectionInondation
          components:
            - type: radio
              name: debordementCoursEau
              label:
                fr: "7.1 – Le sinistre a-t-il été causé par le débordement d'un cours d'eau ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
                NeSaitPas:
                  fr: Je ne sais pas
            - type: text
              name: nomCoursEau
              label:
                fr: "Nom du cours d'eau"
              v-if: "this.val('debordementCoursEau') === 'Oui'"

        - section:
            fr: "Étendue de l'eau"
          id: sectionEtendue
          v-if: "this.val('debordementCoursEau') !== 'Non'"
          components:
            - type: radio
              name: eauAtteintTerrain
              label:
                fr: "7.2 – L'eau provenant du cours d'eau a-t-elle atteint votre terrain ?"
              options:
                Oui:
                  fr: Oui
