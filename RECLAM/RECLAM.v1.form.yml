    # ─── Section 8 – Réclamation ──────────────────────────────────────────────
    - sectionGroup:
        fr: Réclamation
      classes: icone cash-dollar
      sections:

        # ── 8A – Pièces admissibles ───────────────────────────────────────────
        - section:
            fr: "A – Pièces admissibles endommagées"
          id: sectionPieces
          components:
            - type: dynamic
              tag: div
              classes: page-texte
              text:
                fr: |
                  <p>Veuillez sélectionner les pièces admissibles ayant été touchées par le sinistre. Précisez leur emplacement dans la résidence et si celles-ci ont un recouvrement de sol (bois franc, bois d'ingénierie, bois flottant, céramique, vinyle, tapis, etc.).</p>
            - type: radio
              name: aPiecesDommagees
              label:
                fr: "Des pièces de votre résidence ont-elles été endommagées ?"
              options:
                Oui:
                  fr: Oui
                Non:
                  fr: Non
            - type: repeatableGroup
              name: piecesDommagees
              label:
                fr: Pièces endommagées
              v-if: "this.val('aPiecesDommagees') === 'Oui'"
              repeatable: true
              minimum: 1
              components:
                - type: listeDeroulante
                  name: pieceTouchee
                  label:
                    fr: Pièce touchée
                  options: typesPieces
                - type: radio
                  name: pieceEmplacement
                  label:
                    fr: Emplacement
                  options:
                    SousSol:
                      fr: Sous-sol
                    RDC:
                      fr: Rez-de-chaussée
                - type: radio
                  name: pieceRecouvrement
                  label:
                    fr: Recouvrement de sol
                  options:
                    Avec:
                      fr: Avec recouvrement de sol
                    Sans:
                      fr: Sans recouvrement de sol
            - type: customfileUlterieure
              name: docPhotosVideos
